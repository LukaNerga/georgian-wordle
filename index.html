<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ქართული ვორდლი</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=BPG+Mrgvlovani&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <h1 class="title">ქართული ვორდლი</h1>
      <p class="date" id="current-date"></p>
    </div>
  </header>

  <!-- NOTIFICATION BANNER -->
  <div class="notification" id="notification" aria-live="polite"></div>

  <!-- MAIN GAME AREA -->
  <main class="main">

    <!-- GUESS GRID -->
    <section class="board-wrapper" aria-label="სათამაშო დაფა">
      <div class="board" id="board">
        <!-- 6 rows × 5 tiles, generated by JS -->
      </div>
    </section>

    <!-- ON-SCREEN KEYBOARD -->
    <section class="keyboard-wrapper" aria-label="კლავიატურა">
      <div class="keyboard" id="keyboard">
        <!-- Row 1 -->
        <div class="keyboard-row">
          <button class="key" data-key="ქ">ქ</button>
          <button class="key" data-key="წ">წ</button>
          <button class="key" data-key="ე">ე</button>
          <button class="key" data-key="რ">რ</button>
          <button class="key" data-key="ტ">ტ</button>
          <button class="key" data-key="ყ">ყ</button>
          <button class="key" data-key="უ">უ</button>
          <button class="key" data-key="ი">ი</button>
          <button class="key" data-key="ო">ო</button>
          <button class="key" data-key="პ">პ</button>
        </div>
        <!-- Row 2 -->
        <div class="keyboard-row">
          <button class="key" data-key="ა">ა</button>
          <button class="key" data-key="ს">ს</button>
          <button class="key" data-key="დ">დ</button>
          <button class="key" data-key="ფ">ფ</button>
          <button class="key" data-key="გ">გ</button>
          <button class="key" data-key="ჰ">ჰ</button>
          <button class="key" data-key="ჯ">ჯ</button>
          <button class="key" data-key="კ">კ</button>
          <button class="key" data-key="ლ">ლ</button>
        </div>
        <!-- Row 3 -->
        <div class="keyboard-row">
          <button class="key key--wide" data-key="Enter">↵</button>
          <button class="key" data-key="ზ">ზ</button>
          <button class="key" data-key="ხ">ხ</button>
          <button class="key" data-key="ც">ც</button>
          <button class="key" data-key="ვ">ვ</button>
          <button class="key" data-key="ბ">ბ</button>
          <button class="key" data-key="ნ">ნ</button>
          <button class="key" data-key="მ">მ</button>
          <button class="key key--wide" data-key="Backspace">⌫</button>
        </div>
        <!-- Row 4: extra letters -->
        <div class="keyboard-row">
          <button class="key" data-key="შ">შ</button>
          <button class="key" data-key="ჩ">ჩ</button>
          <button class="key" data-key="ჭ">ჭ</button>
          <button class="key" data-key="ძ">ძ</button>
          <button class="key" data-key="წ">წ</button>
          <button class="key" data-key="ჯ">ჯ</button>
          <button class="key" data-key="ღ">ღ</button>
          <button class="key" data-key="თ">თ</button>
          <button class="key" data-key="ყ">ყ</button>
          <button class="key" data-key="ჟ">ჟ</button>
        </div>
      </div>
    </section>

  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal" id="modal">
      <div class="modal-icon" id="modal-icon"></div>
      <h2 class="modal-title" id="modal-title"></h2>
      <p class="modal-subtitle" id="modal-subtitle"></p>
      <p class="modal-word" id="modal-word"></p>
      <div class="modal-result" id="modal-result"></div>
      <button class="modal-share-btn" id="modal-share-btn">📋 გაზიარება</button>
      <button class="modal-close-btn" id="modal-close-btn">დახურვა</button>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="words.js"></script>
  <script src="script.js"></script>
</body>
</html>
